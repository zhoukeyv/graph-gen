<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Editor</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
</head>
<body>

<div class="container">
    <div class="panel left-panel">
        <h1>Graph Editor</h1>
        
        <div class="controls">
            <div class="row">
                <label>节点数 n:</label>
                <input type="number" id="n" value="10" min="1" max="500">
            </div>
            <div class="row">
                <label>边数 m:</label>
                <input type="number" id="m" value="15" min="0" max="10000">
            </div>
            <div class="row">
                <label>最大边权:</label>
                <input type="number" id="maxw" value="10" min="1" max="1000">
            </div>
            <div class="row">
                <label>图类型:</label>
                <select id="type">
                    <option value="tree">随机树 (Prüfer序列)</option>
                    <option value="chain">链</option>
                    <option value="daisy">菊花图</option>
                    <option value="binary">二叉树</option>
                    <option value="graph">随机无向图</option>
                    <option value="w_tree">带权随机树</option>
                </select>
            </div>
            <div class="button-group">
                <button onclick="generateData()">生成数据</button>
                <button onclick="copyOutput()" class="btn-secondary">一键复制</button>
                <span id="copyFeedback" class="copy-feedback"></span>
            </div>
        </div>

        <div class="visual-controls">
            <div class="visual-title">布局与设置</div>
            <div class="slider-row">
                <label>节点大小:</label>
                <input type="range" id="nodeSize" min="10" max="40" value="16" oninput="updateNodeSize(this.value)">
            </div>
            <div class="slider-row">
                <label>弹簧边长:</label>
                <input type="range" id="edgeLength" min="30" max="300" value="100" oninput="updateEdgeLength(this.value)">
            </div>
            <div class="action-row">
                <button class="btn-action" onclick="pinAll()">📌 全部固定</button>
                <button class="btn-action" onclick="unpinAll()">🔄 全部解绑</button>
            </div>
        </div>

        <div class="textarea-container">
            <label class="hint">图数据 (邻接表 / 边集)</label>
            <textarea id="output" spellcheck="false" oninput="renderGraphFromText()"></textarea>
        </div>
    </div>

    <div class="panel right-panel">
        <div class="graph-hint">Shift+左键: 钉住/解除 | 右键: 颜色与标签</div>
        <div id="mynetwork" oncontextmenu="return false;"></div>
    </div>
</div>

<!-- 右键菜单 -->
<div id="contextMenu" class="context-menu" onclick="event.stopPropagation();" onmousedown="event.stopPropagation();" oncontextmenu="return false;">
    <div class="menu-title">编辑节点</div>
    <div class="menu-item">
        <label>标签</label>
        <input type="text" id="nodeLabelInput" autocomplete="off" onkeydown="if(event.key==='Enter') saveNodeConfig()">
    </div>
    <div class="menu-group">
        <div class="menu-item">
            <label>边框色</label>
            <input type="color" id="nodeColorInput" value="#4e6ef2">
        </div>
        <!-- 预设边框色卡 (高对比度) -->
        <div class="color-presets">
            <div class="preset-color" style="border-color: #4e6ef2;" onclick="selectColor('#4e6ef2')" title="默认蓝"></div>
            <div class="preset-color" style="border-color: #e63946;" onclick="selectColor('#e63946')" title="赤红"></div>
            <div class="preset-color" style="border-color: #f4a261;" onclick="selectColor('#f4a261')" title="橙黄"></div>
            <div class="preset-color" style="border-color: #2a9d8f;" onclick="selectColor('#2a9d8f')" title="翠绿"></div>
            <div class="preset-color" style="border-color: #9d4edd;" onclick="selectColor('#9d4edd')" title="深紫"></div>
            <div class="preset-color" style="border-color: #333333;" onclick="selectColor('#333333')" title="纯黑"></div>
        </div>
    </div>
    <div class="menu-buttons">
        <button class="btn-cancel" onclick="closeContextMenu()">取消</button>
        <button class="btn-save" onclick="saveNodeConfig()">保存</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Editor</title>
    <!-- 使用稳定的 CDNJS -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 左侧面板 -->
        <div class="sidebar">
            <h2>Graph Editor</h2>
            
            <details class="gen-box">
                <summary>快速生成图数据</summary>
                <div class="gen-content">
                    <div class="form-group"><label>结构</label><select id="graphStructure"><option value="tree">随机树</option><option value="chain">链表</option><option value="daisy">菊花图</option><option value="binary">二叉树</option><option value="graph">普通图</option></select></div>
                    <div class="form-group"><label>节点数(N)</label><input type="number" id="n" value="10" min="1" max="300"></div>
                    <div class="form-group"><label>边数(M)</label><input type="number" id="m" value="15" min="0"></div>
                    <div class="form-group"><label>方向</label><select id="isDirected"><option value="false">无向图</option><option value="true">有向图</option></select></div>
                    <div class="form-group"><label>边权</label><select id="isWeighted"><option value="false">无权</option><option value="true">带权</option></select></div>
                    <div class="form-group"><label>最大边权</label><input type="number" id="maxw" value="10" min="1"></div>
                    <button class="btn btn-primary" style="width:100%" onclick="generateData()">生成数据</button>
                </div>
            </details>

            <div class="output-container">
                <textarea id="output" placeholder="直接输入边或节点：&#10;A B 10&#10;D" oninput="renderGraphFromText()">
A B 10
B C 5
Apple Banana 99
D
</textarea>
                <button class="btn btn-copy" onclick="copyOutput()">一键复制</button>
                <span id="copyFeedback" class="feedback">已复制！</span>
            </div>
        </div>

        <!-- 右侧可视化与工具栏 -->
        <div class="main-content">
            <div class="toolbar">
                <label>节点大小: <input type="range" id="nodeSize" min="10" max="50" value="16" onchange="updateNodeSize()"></label>
                <label>边长/间距: <input type="range" id="edgeLength" min="50" max="300" value="100" onchange="forcePhysicsUpdate()"></label>
                <button class="btn" onclick="forcePhysicsUpdate()">重新布局</button>
                <button class="btn" onclick="pinAll()">固定所有</button>
                <button class="btn" onclick="unpinAll()">解开所有</button>
                
                <label style="margin-left:10px;">根节点: <input type="text" id="treeRootInput" value="A" style="width: 50px; padding:2px;"></label>
                <button class="btn" onclick="formatAsTree()">树状排版(BFS)</button>
            </div>
            <div id="mynetwork"></div>
        </div>
    </div>

    <!-- 右键菜单：节点 -->
    <div id="nodeContextMenu" class="context-menu">
        <div style="padding: 8px 12px; border-bottom: 1px solid #eee;">
            <label style="font-size: 12px; color: #666;">修改节点标签 (Label):</label>
            <input type="text" id="nodeLabelInput" style="width: 100%; margin-top: 4px; padding: 4px; box-sizing: border-box;">
            <button class="btn btn-primary" style="width: 100%; margin-top: 6px; padding: 4px;" onclick="saveNodeLabel()">保存标签</button>
        </div>
        <div style="padding: 8px 12px; display: flex; align-items: center; justify-content: space-between;">
            <label style="font-size: 13px; color: #333; cursor:pointer;">修改颜色:</label>
            <input type="color" id="nodeColorInput" onchange="changeNodeColor()" style="border:none; width:24px; height:24px; cursor:pointer; padding:0;">
        </div>
    </div>
    
    <!-- 右键菜单：边 -->
    <div id="edgeContextMenu" class="context-menu">
        <div style="padding: 8px 12px;">
            <label style="font-size: 12px; color: #666;">修改边权 (双向同步):</label>
            <input type="text" id="edgeLabelInput" style="width: 100%; margin-top: 4px; padding: 4px; box-sizing: border-box;">
            <button class="btn btn-primary" style="width: 100%; margin-top: 6px; padding: 4px;" onclick="saveEdgeWeight()">保存并同步到文本</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

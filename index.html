<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图论数据生成器</title>
    <style>
        * {
            font-family: system-ui, sans-serif;
            box-sizing: border-box;
        }
        body {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f7f9fc;
        }
        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 10px #0001;
        }
        h1 {
            margin-top: 0;
            color: #222;
        }
        .row {
            margin: 12px 0;
        }
        label {
            display: inline-block;
            width: 120px;
            font-weight: 500;
        }
        input, select, button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background: #4e6ef2;
            color: white;
            border: none;
            cursor: pointer;
            margin-right: 8px;
        }
        button:hover {
            background: #3a5cd3;
        }
        textarea {
            width: 100%;
            height: 240px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>图论随机数据生成器</h1>

    <div class="row">
        <label>节点数量 n:</label>
        <input type="number" id="n" value="10" min="1" max="10000">
    </div>

    <div class="row">
        <label>边数 m (仅图):</label>
        <input type="number" id="m" value="15" min="0" max="100000">
    </div>

    <div class="row">
        <label>最大边权:</label>
        <input type="number" id="maxw" value="10" min="1" max="1000">
    </div>

    <div class="row">
        <label>生成类型:</label>
        <select id="type">
            <option value="tree">随机树</option>
            <option value="chain">链</option>
            <option value="daisy">菊花图</option>
            <option value="binary">二叉树</option>
            <option value="graph">随机无向图</option>
            <option value="w_tree">带权随机树</option>
        </select>
    </div>

    <div class="row">
        <button onclick="generate()">生成数据</button>
        <button onclick="copyOutput()">一键复制</button>
    </div>

    <textarea id="output" placeholder="生成结果将显示在这里……"></textarea>
</div>

<script>
function rand(l, r) {
    return Math.floor(Math.random() * (r - l + 1)) + l;
}

function genTree(n) {
    let res = n + '\n';
    for (let i = 2; i <= n; i++) {
        let fa = rand(1, i - 1);
        res += fa + ' ' + i + '\n';
    }
    return res;
}

function genChain(n) {
    let res = n + '\n';
    for (let i = 1; i < n; i++) res += i + ' ' + (i + 1) + '\n';
    return res;
}

function genDaisy(n) {
    let res = n + '\n';
    for (let i = 2; i <= n; i++) res += '1 ' + i + '\n';
    return res;
}

function genBinary(n) {
    let res = n + '\n';
    for (let i = 1; i * 2 <= n; i++) {
        res += i + ' ' + (i * 2) + '\n';
        if (i * 2 + 1 <= n) res += i + ' ' + (i * 2 + 1) + '\n';
    }
    return res;
}

function genGraph(n, m) {
    let set = new Set();
    while (set.size < m) {
        let u = rand(1, n), v = rand(1, n);
        if (u === v) continue;
        if (u > v) [u, v] = [v, u];
        set.add(u + ',' + v);
    }
    let res = n + ' ' + m + '\n';
    for (let s of set) res += s.replace(',', ' ') + '\n';
    return res;
}

function genWeightTree(n, maxw) {
    let res = n + '\n';
    for (let i = 2; i <= n; i++) {
        let fa = rand(1, i - 1);
        let w = rand(1, maxw);
        res += fa + ' ' + i + ' ' + w + '\n';
    }
    return res;
}

function generate() {
    const n = parseInt(document.getElementById('n').value);
    const m = parseInt(document.getElementById('m').value);
    const maxw = parseInt(document.getElementById('maxw').value);
    const type = document.getElementById('type').value;

    let out = '';
    switch (type) {
        case 'tree': out = genTree(n); break;
        case 'chain': out = genChain(n); break;
        case 'daisy': out = genDaisy(n); break;
        case 'binary': out = genBinary(n); break;
        case 'graph': out = genGraph(n, m); break;
        case 'w_tree': out = genWeightTree(n, maxw); break;
    }
    document.getElementById('output').value = out.trim();
}

function copyOutput() {
    const text = document.getElementById('output').value;
    navigator.clipboard.writeText(text).then(() => {
        alert('复制成功！直接粘贴到画图工具即可');
    });
}
</script>
</body>
</html>

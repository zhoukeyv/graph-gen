<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>算法图论数据生成与可视化</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>Graph Editor</h2>
        
        <details class="gen-box" open>
            <summary>配置与生成图数据</summary>
            <div class="gen-content">
                <div class="form-group">
                    <label>结构类型</label>
                    <select id="graphStructure">
                        <option value="tree">随机树 (Tree)</option>
                        <option value="chain">链表 (Chain)</option>
                        <option value="daisy">菊花图 (Daisy)</option>
                        <option value="binary">二叉树 (Binary Tree)</option>
                        <option value="cactus">仙人掌图 (Cactus)</option>
                        <option value="bipartite">二分图 (Bipartite)</option>
                        <option value="graph">普通图 (Graph)</option>
                    </select>
                </div>
                <div class="form-group"><label>节点数 (N)</label><input type="number" id="n" value="15" min="1" max="300"></div>
                <div class="form-group"><label>边数 (M)</label><input type="number" id="m" value="20" min="0"></div>
                <div class="form-group"><label>有向图</label><select id="isDirected"><option value="false">无向 (Undirected)</option><option value="true">有向 (Directed)</option></select></div>
                <div class="form-group"><label>边权</label><select id="isWeighted"><option value="false">无权 (Unweighted)</option><option value="true">有权 (Weighted)</option></select></div>
                <div class="form-group"><label>最大边权</label><input type="number" id="maxw" value="10" min="1" disabled></div>
                <button class="btn btn-primary" onclick="generateData()">生成数据</button>
            </div>
        </details>

        <div class="output-container">
            <textarea id="output" placeholder="支持任意字符串，如：&#10;A B 10&#10;苹果 香蕉&#10;孤立节点" oninput="renderGraphFromText()"></textarea>
            <button class="btn btn-copy" onclick="copyOutput()">复制</button><span id="copyFeedback" class="feedback">已复制！</span>
        </div>
    </div>
    
    <div class="main-content">
        <div class="toolbar">
            <div class="tool-group"><label>节点大小:</label><input type="range" id="nodeSize" value="20" min="10" max="50" onchange="updateNodeSize(this.value)"></div>
            <div class="tool-group"><label>边长(弹簧):</label><input type="range" id="edgeLength" value="100" min="30" max="300" onchange="updateEdgeLength(this.value)"></div>
            <div class="divider"></div>
            <button class="btn" onclick="pinAll()">固定所有</button>
            <button class="btn" onclick="unpinAll()">全部解除</button>
            <div class="divider"></div>
            
            <!-- 增加了 id="treeLayoutBox" -->
            <div class="tree-layout-box" id="treeLayoutBox">
                <button class="btn-tree" onclick="formatAsTree()">树状排版</button>
                <div class="tree-input-wrapper"><span class="tree-label">根:</span><input type="text" id="treeRootInput" value="1" title="设置树的根节点标识符"></div>
            </div>
            
            <!-- 增加了 id="bipartiteLayoutBtn" -->
            <button class="btn" id="bipartiteLayoutBtn" style="height:36px; border-color:var(--primary); color:var(--primary);" onclick="formatAsBipartite()">二分图排版(左右)</button>
        </div>
        <div id="mynetwork"></div>
    </div>
    
    <div id="contextMenu" class="context-menu">
        <label>修改标签:</label><input type="text" id="nodeLabelInput" onkeydown="if(event.key==='Enter') saveNodeConfig()">
        <label>选择颜色 (或快捷键):</label>
        <div class="color-picker">
            <div class="color-swatch" style="background:#e63946" onclick="selectColor('#e63946')" title="R键"></div><div class="color-swatch" style="background:#4e6ef2" onclick="selectColor('#4e6ef2')" title="B键"></div><div class="color-swatch" style="background:#2a9d8f" onclick="selectColor('#2a9d8f')" title="G键"></div><div class="color-swatch" style="background:#f4a261" onclick="selectColor('#f4a261')" title="Y键"></div><div class="color-swatch" style="background:#9d4edd" onclick="selectColor('#9d4edd')" title="P键"></div><div class="color-swatch" style="background:#333333" onclick="selectColor('#333333')" title="D键"></div>
        </div>
        <input type="hidden" id="nodeColorInput"><button class="btn btn-primary" style="margin-top:8px;width:100%" onclick="saveNodeConfig()">保存 (Enter)</button>
    </div>
    
    <div id="edgeContextMenu" class="context-menu">
        <label>修改边权/标签:</label><input type="text" id="edgeLabelInput" onkeydown="if(event.key==='Enter') saveEdgeConfig()"><button class="btn btn-primary" style="margin-top:8px;width:100%" onclick="saveEdgeConfig()">保存 (Enter)</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>

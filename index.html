<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图论数据生成器 & 实时预览</title>
    <link rel="stylesheet" href="style.css">
    <!-- 使用国内加速稳定的 CDN -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
</head>
<body>

<div class="container">
    <div class="panel left-panel">
        <h1>图论数据生成器</h1>
        
        <div class="controls">
            <div class="row">
                <label>节点数量 n:</label>
                <input type="number" id="n" value="10" min="1" max="500">
            </div>
            <div class="row">
                <label>边数 m:</label>
                <input type="number" id="m" value="15" min="0" max="10000">
            </div>
            <div class="row">
                <label>最大边权:</label>
                <input type="number" id="maxw" value="10" min="1" max="1000">
            </div>
            <div class="row">
                <label>生成类型:</label>
                <select id="type">
                    <option value="tree">随机树 (Prüfer序列)</option>
                    <option value="chain">链</option>
                    <option value="daisy">菊花图</option>
                    <option value="binary">二叉树</option>
                    <option value="graph">随机无向图</option>
                    <option value="w_tree">带权随机树</option>
                </select>
            </div>
            <div class="button-group">
                <button onclick="generateData()">生成数据</button>
                <button onclick="copyOutput()" class="btn-secondary">一键复制</button>
                <span id="copyFeedback" class="copy-feedback"></span>
            </div>
        </div>

        <!-- 新增：可视化调节面板 -->
        <div class="visual-controls">
            <div class="visual-title">🎨 图形显示调节</div>
            <div class="slider-row">
                <label>节点大小:</label>
                <input type="range" id="nodeSize" min="10" max="40" value="16">
            </div>
            <div class="slider-row">
                <label>边长(弹簧):</label>
                <input type="range" id="edgeLength" min="30" max="300" value="100">
            </div>
        </div>

        <div class="textarea-container">
            <p class="hint">直接在此修改数据，右侧图形会实时同步更新：</p>
            <textarea id="output" spellcheck="false"></textarea>
        </div>
    </div>

    <div class="panel right-panel">
        <div id="mynetwork"></div>
    </div>
</div>

<!-- 新增：自定义悬浮右键菜单 -->
<div id="contextMenu" class="context-menu">
    <div class="menu-title">修改节点标签</div>
    <input type="text" id="nodeLabelInput" autocomplete="off">
    <button id="saveLabelBtn">保存 (Enter)</button>
</div>

<script src="script.js"></script>
</body>
</html>

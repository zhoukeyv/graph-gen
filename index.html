<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图论数据生成器</title>
    <style>
        * {
            font-family: system-ui, -apple-system, sans-serif;
            box-sizing: border-box;
        }
        body {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f0f4f8;
            color: #333;
        }
        .card {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h1 {
            margin-top: 0;
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 600;
        }
        .row {
            margin: 16px 0;
            display: flex;
            align-items: center;
        }
        label {
            width: 140px;
            font-weight: 500;
            color: #444;
        }
        input, select, button {
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4e6ef2;
            box-shadow: 0 0 0 3px rgba(78, 110, 242, 0.1);
        }
        button {
            background: #4e6ef2;
            color: white;
            border: none;
            cursor: pointer;
            margin-right: 10px;
            font-weight: 500;
        }
        button:hover {
            background: #3a5cd3;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(0);
        }
        textarea {
            width: 100%;
            height: 280px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            resize: vertical;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 8px;
        }
        textarea:focus {
            outline: none;
            border-color: #4e6ef2;
            box-shadow: 0 0 0 3px rgba(78, 110, 242, 0.1);
        }
    </style>
</head>
<body>
<div class="card">
    <h1>图论随机数据生成器</h1>

    <div class="row">
        <label>节点数量 n:</label>
        <input type="number" id="n" value="10" min="1" max="10000">
    </div>

    <div class="row">
        <label>边数 m (仅图):</label>
        <input type="number" id="m" value="15" min="0" max="100000">
    </div>

    <div class="row">
        <label>最大边权:</label>
        <input type="number" id="maxw" value="10" min="1" max="1000">
    </div>

    <div class="row">
        <label>生成类型:</label>
        <select id="type">
            <option value="tree">随机树</option>
            <option value="chain">链</option>
            <option value="daisy">菊花图</option>
            <option value="binary">二叉树</option>
            <option value="graph">随机无向图</option>
            <option value="w_tree">带权随机树</option>
        </select>
    </div>

    <div class="row">
        <button onclick="generate()">生成数据</button>
        <button onclick="copyOutput()">一键复制</button>
    </div>

    <textarea id="output" placeholder="生成结果将显示在这里……"></textarea>
</div>

<script>
function rand(l, r) {
    return Math.floor(Math.random() * (r - l + 1)) + l;
}

// 基于 Prufer 序列生成均匀随机树
function genTree(n) {
    if (n === 1) return '1\n';
    let prufer = [];
    for (let i = 0; i < n - 2; i++) prufer.push(rand(1, n));
    
    let degree = new Array(n + 1).fill(1);
    for (let x of prufer) degree[x]++;
    
    let edges = [];
    let ptr = 1;
    for (let x of prufer) {
        while (degree[ptr] !== 1) ptr++;
        edges.push([ptr, x]);
        degree[ptr]--;
        degree[x]--;
    }
    
    let u = 0, v = 0;
    for (let i = 1; i <= n; i++) {
        if (degree[i] === 1) {
            if (u === 0) u = i;
            else { v = i; break; }
        }
    }
    edges.push([u, v]);
    
    let res = n + '\n';
    for (let [a, b] of edges) res += a + ' ' + b + '\n';
    return res;
}

function genChain(n) {
    let res = n + '\n';
    for (let i = 1; i < n; i++) res += i + ' ' + (i + 1) + '\n';
    return res;
}

function genDaisy(n) {
    let res = n + '\n';
    for (let i = 2; i <= n; i++) res += '1 ' + i + '\n';
    return res;
}

function genBinary(n) {
    let res = n + '\n';
    for (let i = 1; i * 2 <= n; i++) {
        res += i + ' ' + (i * 2) + '\n';
        if (i * 2 + 1 <= n) res += i + ' ' + (i * 2 + 1) + '\n';
    }
    return res;
}

function genGraph(n, m) {
    let maxEdges = n * (n - 1) / 2;
    if (m > maxEdges) {
        alert('边数过多！无向图最多 ' + maxEdges + ' 条边');
        return '';
    }
    let set = new Set();
    while (set.size < m) {
        let u = rand(1, n), v = rand(1, n);
        if (u === v) continue;
        if (u > v) [u, v] = [v, u];
        set.add(u + ',' + v);
    }
    let res = n + ' ' + m + '\n';
    for (let s of set) res += s.replace(',', ' ') + '\n';
    return res;
}

function genWeightTree(n, maxw) {
    if (n === 1) return '1\n';
    // 带权树也使用 Prufer 序列
    let prufer = [];
    for (let i = 0; i < n - 2; i++) prufer.push(rand(1, n));
    
    let degree = new Array(n + 1).fill(1);
    for (let x of prufer) degree[x]++;
    
    let edges = [];
    let ptr = 1;
    for (let x of prufer) {
        while (degree[ptr] !== 1) ptr++;
        let w = rand(1, maxw);
        edges.push([ptr, x, w]);
        degree[ptr]--;
        degree[x]--;
    }
    
    let u = 0, v = 0;
    for (let i = 1; i <= n; i++) {
        if (degree[i] === 1) {
            if (u === 0) u = i;
            else { v = i; break; }
        }
    }
    let w = rand(1, maxw);
    edges.push([u, v, w]);
    
    let res = n + '\n';
    for (let [a, b, w] of edges) res += a + ' ' + b + ' ' + w + '\n';
    return res;
}

function generate() {
    const n = parseInt(document.getElementById('n').value);
    const m = parseInt(document.getElementById('m').value);
    const maxw = parseInt(document.getElementById('maxw').value);
    const type = document.getElementById('type').value;

    let out = '';
    switch (type) {
        case 'tree': out = genTree(n); break;
        case 'chain': out = genChain(n); break;
        case 'daisy': out = genDaisy(n); break;
        case 'binary': out = genBinary(n); break;
        case 'graph': out = genGraph(n, m); break;
        case 'w_tree': out = genWeightTree(n, maxw); break;
    }
    document.getElementById('output').value = out.trim();
}

function copyOutput() {
    const text = document.getElementById('output').value;
    navigator.clipboard.writeText(text).then(() => {
        alert('复制成功！');
    });
}
</script>
</body>
</html>
